<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronak Drive - File Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <i class="fas fa-cloud"></i>
        <span>Ronak Drive</span>
      </div>
      <div class="nav-right">
        <button id="darkModeBtn" class="theme-btn">
          <i class="fas fa-moon"></i>
        </button>
        <a href="admin.html" class="btn-admin">Admin Panel</a>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="container">
    <!-- Welcome Section -->
    <section class="welcome-section">
      <h1>📁 Ronak Drive</h1>
      <p>Secure File Management System</p>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search files...">
        <button id="searchBtn"><i class="fas fa-search"></i></button>
      </div>
    </section>

    <!-- Stats Section -->
    <section class="stats-section">
      <div class="stat-card">
        <i class="fas fa-file"></i>
        <div>
          <h3 id="fileCount">0</h3>
          <p>Total Files</p>
        </div>
      </div>
      <div class="stat-card">
        <i class="fas fa-lock"></i>
        <div>
          <h3 id="lockedCount">0</h3>
          <p>Locked Files</p>
        </div>
      </div>
      <div class="stat-card">
        <i class="fas fa-unlock"></i>
        <div>
          <h3 id="accessCount">0</h3>
          <p>Accessible Files</p>
        </div>
      </div>
    </section>

    <!-- Files List -->
    <section class="files-section">
      <h2>📂 Available Files</h2>
      <div id="filesList" class="files-grid">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading files...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal for file details -->
  <div id="fileModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="modalFileName"></h2>
      <div class="modal-details">
        <p><strong>Size:</strong> <span id="modalFileSize"></span></p>
        <p><strong>Uploaded:</strong> <span id="modalFileDate"></span></p>
        <p id="accessStatus"></p>
      </div>
      <div class="modal-actions">
        <button id="downloadBtn" class="btn btn-primary" style="display:none;">
          <i class="fas fa-download"></i> Download
        </button>
        <button id="requestAccessBtn" class="btn btn-secondary" style="display:none;">
          <i class="fas fa-key"></i> Request Access
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2024 Ronak Drive. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
